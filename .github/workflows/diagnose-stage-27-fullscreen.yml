name: Diagnose Stage 27 Fullscreen

on:
  push:
    branches:
      - refactor/webchrome-fullscreen

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Locate fullscreen state and lifecycle references
        run: |
          grep -n -E "fullscreenVideoView|fullscreenVideoCallback|originalSystemUiVisibility|restoreAfterVideoFullscreen|onShowCustomView|onHideCustomView" app/src/main/java/com/yieldbrowser/app/MainActivity.java | tee fullscreen-references.txt
      - name: Upload references
        uses: actions/upload-artifact@v4
        with:
          name: stage-27-fullscreen-references
          path: fullscreen-references.txt
