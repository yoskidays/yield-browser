name: Safe Stage 64 Download Hard Ad Token

on:
  push:
    branches:
      - refactor/download-hard-ad-token
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  validate:
    name: Test and build hard-ad token extraction
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Apply guarded hard-ad token delegation
        run: python3 scripts/apply_download_hard_ad_token_refactor.py

      - name: Run all unit tests
        run: gradle testDebugUnitTest --stacktrace

      - name: Build debug APK
        run: gradle assembleDebug --stacktrace

      - name: Commit validated policy and delegation
        if: github.event_name == 'push'
        env:
          HEAD_BRANCH: refactor/download-hard-ad-token
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/src/main/java/com/yieldbrowser/app/DownloadUrlPolicy.java
          git add app/src/main/java/com/yieldbrowser/app/MainActivity.java
          if git diff --cached --quiet; then
            echo "Hard-ad token extraction already committed."
          else
            git commit -m "Stage 64: centralize hard-ad click tokens"
            git push origin HEAD:${HEAD_BRANCH}
          fi

      - name: Upload validated APK
        uses: actions/upload-artifact@v4
        with:
          name: YieldBrowser-download-hard-ad-token-apk
          path: app/build/outputs/apk/debug/*.apk
