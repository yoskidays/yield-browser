name: Apply Clear Download History Feature

on:
  push:
    branches:
      - main
    paths:
      - .github/scripts/apply_clear_download_history.py

permissions:
  contents: write
  issues: write

jobs:
  apply:
    name: Patch, Test, Build and Commit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Apply source patch
        run: python3 .github/scripts/apply_clear_download_history.py

      - name: Run unit tests and build APK
        run: gradle testDebugUnitTest assembleDebug --stacktrace

      - name: Remove one-time patch files
        run: |
          rm -f .github/scripts/apply_clear_download_history.py
          rm -f .github/workflows/apply-clear-download-history.yml

      - name: Commit feature
        id: commit_feature
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add clear all download history action"
          git push origin main
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Upload tested APK
        uses: actions/upload-artifact@v4
        with:
          name: YieldBrowser-clear-history-debug-apk
          path: app/build/outputs/apk/debug/*.apk

      - name: Publish build result
        env:
          GH_TOKEN: ${{ github.token }}
          FEATURE_SHA: ${{ steps.commit_feature.outputs.sha }}
        run: |
          gh issue create \
            --title "Clear download history build ${GITHUB_RUN_ID}" \
            --body "Feature commit: ${FEATURE_SHA}\nRun ID: ${GITHUB_RUN_ID}\nArtifact: YieldBrowser-clear-history-debug-apk"
