name: Diagnose History Favicon Pipeline

on:
  push:
    branches:
      - refactor/history-favicon-pipeline
  pull_request:
    branches:
      - main

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Capture favicon fields and method
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('app/src/main/java/com/yieldbrowser/app/MainActivity.java')
          text = path.read_text(encoding='utf-8')
          lines = text.splitlines()
          output = ['=== FAVICON REFERENCES ===']
          for number, line in enumerate(lines, 1):
              if 'favicon' in line.lower():
                  output.append(f'{number}: {line}')

          def extract_method(signature):
              start = text.find(signature)
              if start < 0:
                  raise SystemExit(f'Method not found: {signature}')
              brace = text.find('{', start)
              depth = 0
              in_string = False
              escaped = False
              quote = ''
              for i in range(brace, len(text)):
                  ch = text[i]
                  if in_string:
                      if escaped:
                          escaped = False
                      elif ch == '\\':
                          escaped = True
                      elif ch == quote:
                          in_string = False
                      continue
                  if ch in ('\"', "'"):
                      in_string = True
                      quote = ch
                  elif ch == '{':
                      depth += 1
                  elif ch == '}':
                      depth -= 1
                      if depth == 0:
                          return text[start:i + 1]
              raise SystemExit(f'Unclosed method: {signature}')

          output.append('=== LOAD FAVICON METHOD ===')
          output.append(extract_method('    private void loadFavicon('))
          diagnostic = '\n'.join(output) + '\n'
          Path('favicon-diagnostic.txt').write_text(diagnostic, encoding='utf-8')
          print(diagnostic)
          PY

      - name: Upload favicon diagnostic
        uses: actions/upload-artifact@v4
        with:
          name: favicon-pipeline-diagnostic
          path: favicon-diagnostic.txt
