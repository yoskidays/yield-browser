name: Build Yield Browser Update APK

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 1"

permissions:
  contents: read

jobs:
  build-update-apk:
    name: Test and build update APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Restore persistent APK signing key
        id: signing-cache
        uses: actions/cache@v4
        with:
          path: ~/.android/debug.keystore
          key: yield-browser-update-signing-v1

      - name: Stop if signing key is unavailable
        if: steps.signing-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          echo "Yield Browser update signing key is missing."
          echo "Build stopped to prevent an APK with an incompatible certificate."
          exit 1

      - name: Remove committed and cached build outputs
        shell: bash
        run: |
          rm -rf app/build build dist

      - name: Run clean unit tests
        run: gradle clean testDebugUnitTest --stacktrace --no-build-cache --rerun-tasks

      - name: Build clean update APK
        run: gradle assembleDebug --stacktrace --no-build-cache --rerun-tasks

      - name: Verify APK signing certificate
        shell: bash
        run: |
          APK="app/build/outputs/apk/debug/app-debug.apk"
          test -f "$APK"
          KEY_SHA256=$(keytool -list -v \
            -keystore "$HOME/.android/debug.keystore" \
            -storepass android \
            -alias androiddebugkey \
            | sed -n 's/.*SHA256: //p' | head -n 1 | tr -d '\r')
          APK_SHA256=$(keytool -printcert -jarfile "$APK" \
            | sed -n 's/.*SHA256: //p' | head -n 1 | tr -d '\r')
          echo "Signing key SHA256: $KEY_SHA256"
          echo "APK signer SHA256:  $APK_SHA256"
          test -n "$KEY_SHA256"
          test "$KEY_SHA256" = "$APK_SHA256"

      - name: Prepare distributable files
        shell: bash
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/debug/app-debug.apk dist/YieldBrowser-v0.10.22-update.apk
          keytool -printcert -jarfile dist/YieldBrowser-v0.10.22-update.apk \
            | grep -E "SHA256:|Owner:|Valid from:" > dist/signing-certificate.txt
          sha256sum dist/YieldBrowser-v0.10.22-update.apk > dist/YieldBrowser-v0.10.22-update.apk.sha256
          cat > dist/INSTALLATION.txt <<'EOF'
          Yield Browser v0.10.22 Update
          Package: com.yieldbrowser.install
          Version code: 96

          Install the APK directly over the existing Yield Browser app.
          Do not clear app data and do not uninstall the old app.

          Android preserves bookmarks, history, tabs, downloads metadata,
          and settings when the package name and signing certificate match.
          EOF

      - name: Upload update APK
        uses: actions/upload-artifact@v4
        with:
          name: YieldBrowser-v0.10.22-update
          path: dist/*
          if-no-files-found: error
          retention-days: 30
