name: Build Yield Browser TEST APK

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test-apk:
    name: Test and build side-by-side APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Restore persistent APK signing key
        id: signing-cache
        uses: actions/cache@v4
        with:
          path: ~/.android/debug.keystore
          key: yield-browser-update-signing-v1

      - name: Stop if signing key is unavailable
        if: steps.signing-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          echo "Yield Browser signing key is missing."
          echo "Build stopped instead of creating a new certificate."
          exit 1

      - name: Remove committed and cached build outputs
        shell: bash
        run: |
          rm -rf app/build build dist

      - name: Run clean unit tests
        run: gradle clean testDebugUnitTest --stacktrace --no-build-cache --rerun-tasks

      - name: Build clean test APK
        run: gradle assembleDebug --stacktrace --no-build-cache --rerun-tasks

      - name: Verify APK signing certificate
        shell: bash
        run: |
          APK="app/build/outputs/apk/debug/app-debug.apk"
          test -f "$APK"
          KEY_SHA256=$(keytool -list -v \
            -keystore "$HOME/.android/debug.keystore" \
            -storepass android \
            -alias androiddebugkey \
            | sed -n 's/.*SHA256: //p' | head -n 1 | tr -d '\r')
          APK_SHA256=$(keytool -printcert -jarfile "$APK" \
            | sed -n 's/.*SHA256: //p' | head -n 1 | tr -d '\r')
          echo "Signing key SHA256: $KEY_SHA256"
          echo "APK signer SHA256:  $APK_SHA256"
          test -n "$KEY_SHA256"
          test "$KEY_SHA256" = "$APK_SHA256"

      - name: Prepare distributable files
        shell: bash
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/debug/app-debug.apk dist/YieldBrowser-v0.10.22-TEST.apk
          keytool -printcert -jarfile dist/YieldBrowser-v0.10.22-TEST.apk \
            | grep -E "SHA256:|Owner:|Valid from:" > dist/signing-certificate.txt
          sha256sum dist/YieldBrowser-v0.10.22-TEST.apk > dist/YieldBrowser-v0.10.22-TEST.apk.sha256
          cat > dist/INSTALLATION.txt <<'EOF'
          Yield Browser v0.10.22 TEST
          Package: com.yieldbrowser.install.test
          Version code: 96

          This is a separate test application named Yield TEST.
          It can be installed beside the main Yield Browser application.
          It does not replace, uninstall, clear, or modify the main app data.
          Test the download link and Back behavior here first.
          EOF

      - name: Upload test APK
        uses: actions/upload-artifact@v4
        with:
          name: YieldBrowser-v0.10.22-TEST
          path: dist/*
          if-no-files-found: error
          retention-days: 30
