name: Build Yield Browser Update APK

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-update-apk:
    name: Test and build update APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Restore persistent APK signing key
        id: signing-cache
        uses: actions/cache@v4
        with:
          path: ~/.android/debug.keystore
          key: yield-browser-update-signing-v1

      - name: Create signing key on first build
        if: steps.signing-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          mkdir -p "$HOME/.android"
          keytool -genkeypair -v \
            -keystore "$HOME/.android/debug.keystore" \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -dname "CN=Yield Browser, O=FN Digital, C=ID" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000

      - name: Run unit tests
        run: gradle testDebugUnitTest --stacktrace

      - name: Build update APK
        run: gradle assembleDebug --stacktrace

      - name: Prepare distributable files
        shell: bash
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/debug/app-debug.apk dist/YieldBrowser-v0.10.18-update.apk
          keytool -list -v \
            -keystore "$HOME/.android/debug.keystore" \
            -storepass android \
            -alias androiddebugkey \
            | grep -E "SHA256:|Owner:|Valid from:" > dist/signing-certificate.txt
          cat > dist/INSTALLATION.txt <<'EOF'
          Yield Browser v0.10.18 Update
          Package: com.yieldbrowser.install
          Version code: 92

          Install the APK directly over the existing Yield Browser app.
          Do not clear app data and do not uninstall the old app.

          Android preserves bookmarks, history, tabs, downloads metadata,
          and settings when the package name and signing certificate match.
          EOF

      - name: Upload update APK
        uses: actions/upload-artifact@v4
        with:
          name: YieldBrowser-v0.10.18-update
          path: dist/*
          if-no-files-found: error
          retention-days: 30
