name: Build Yield Browser APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    name: Test and Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Apply pending guarded refactor
        if: ${{ hashFiles('scripts/apply_pending_refactor.py') != '' }}
        run: python3 scripts/apply_pending_refactor.py

      - name: Verify generated patch formatting
        if: ${{ hashFiles('scripts/apply_pending_refactor.py') != '' }}
        run: git diff --check

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Run unit tests
        run: gradle testDebugUnitTest --stacktrace

      - name: Build Debug APK
        run: gradle assembleDebug --stacktrace

      - name: Commit validated MainActivity refactor
        if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && hashFiles('scripts/apply_pending_refactor.py') != '' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/src/main/java/com/yieldbrowser/app/MainActivity.java
          if ! git diff --cached --quiet; then
            git commit -m "Apply validated MainActivity refactor"
            git push origin HEAD:${{ github.event.pull_request.head.ref }}
          fi

      - name: Upload generated MainActivity
        if: ${{ hashFiles('scripts/apply_pending_refactor.py') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: Guarded-refactor-MainActivity
          path: app/src/main/java/com/yieldbrowser/app/MainActivity.java

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: YieldBrowser-debug-apk
          path: app/build/outputs/apk/debug/*.apk
