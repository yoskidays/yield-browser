name: Build Yield Browser APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    name: Test and Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Apply pending guarded refactor
        if: ${{ hashFiles('scripts/apply_pending_refactor.py') != '' }}
        run: python3 scripts/apply_pending_refactor.py

      - name: Verify generated patch formatting
        if: ${{ hashFiles('scripts/apply_pending_refactor.py') != '' }}
        run: git diff --check

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Restore persistent APK signing key
        id: signing-cache
        uses: actions/cache@v4
        with:
          path: ~/.android/debug.keystore
          key: yield-browser-update-signing-v1

      - name: Stop if signing key is unavailable
        if: steps.signing-cache.outputs.cache-hit != 'true'
        run: |
          echo "Yield Browser update signing key is missing."
          echo "Build stopped to prevent an incompatible APK."
          exit 1

      - name: Remove committed and cached build outputs
        run: rm -rf app/build build

      - name: Run unit tests
        shell: bash
        run: |
          set -o pipefail
          gradle clean testDebugUnitTest --stacktrace --no-build-cache --rerun-tasks 2>&1 | tee unit-test.log

      - name: Build Debug APK
        shell: bash
        run: |
          set -o pipefail
          gradle assembleDebug --stacktrace --no-build-cache --rerun-tasks 2>&1 | tee apk-build.log

      - name: Verify APK signing certificate
        shell: bash
        run: |
          APK="app/build/outputs/apk/debug/app-debug.apk"
          KEY_SHA256=$(keytool -list -v \
            -keystore "$HOME/.android/debug.keystore" \
            -storepass android \
            -alias androiddebugkey \
            | sed -n 's/.*SHA256: //p' | head -n 1 | tr -d '\r')
          APK_SHA256=$(keytool -printcert -jarfile "$APK" \
            | sed -n 's/.*SHA256: //p' | head -n 1 | tr -d '\r')
          test -n "$KEY_SHA256"
          test "$KEY_SHA256" = "$APK_SHA256"

      - name: Upload Gradle failure logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: Gradle-failure-logs
          path: |
            unit-test.log
            apk-build.log
            app/build/reports/tests/
          if-no-files-found: ignore

      - name: Commit validated generated refactor
        if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && hashFiles('scripts/apply_pending_refactor.py') != '' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/src/main/java/com/yieldbrowser/app/*.java
          if ! git diff --cached --quiet; then
            git commit -m "Apply validated generated refactor"
            git push origin HEAD:${{ github.event.pull_request.head.ref }}
          fi

      - name: Upload generated Java sources
        if: ${{ hashFiles('scripts/apply_pending_refactor.py') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: Guarded-refactor-Java-sources
          path: app/src/main/java/com/yieldbrowser/app/*.java

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: YieldBrowser-debug-apk
          path: app/build/outputs/apk/debug/*.apk
