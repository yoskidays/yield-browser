name: Build Yield Browser APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: write
  issues: write

jobs:
  build:
    name: Test and Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Apply staged MainActivity refactor
        run: python3 scripts/apply_download_list_policy_refactor.py

      - name: Run unit tests
        run: gradle testDebugUnitTest --stacktrace

      - name: Build Debug APK
        run: gradle assembleDebug --stacktrace

      - name: Commit validated refactor
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/src/main/java/com/yieldbrowser/app/MainActivity.java
          if git diff --cached --quiet; then
            echo "No validated refactor change to commit."
          else
            git commit -m "Delegate download list policy from MainActivity"
            git push origin HEAD:main
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: YieldBrowser-staged-refactor-apk
          path: app/build/outputs/apk/debug/*.apk

      - name: Publish verification success
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create \
            --title "Staged refactor verified ${GITHUB_RUN_ID}" \
            --body "Commit: ${GITHUB_SHA}\nRun ID: ${GITHUB_RUN_ID}\nArtifact: YieldBrowser-staged-refactor-apk"

      - name: Publish verification failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create \
            --title "Staged refactor failed ${GITHUB_RUN_ID}" \
            --body "Commit: ${GITHUB_SHA}\nRun ID: ${GITHUB_RUN_ID}. Review the failed workflow before further refactoring."
