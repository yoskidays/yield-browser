name: Build Yield Browser APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: write
  issues: write

jobs:
  build:
    name: Test and Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Apply staged controls UI refactor
        run: python3 scripts/apply_download_controls_factory.py

      - name: Run unit tests
        run: |
          set -o pipefail
          gradle testDebugUnitTest --stacktrace --console=plain 2>&1 | tee /tmp/unit-test.log

      - name: Build Debug APK
        run: gradle assembleDebug --stacktrace

      - name: Commit validated refactor
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/src/main/java/com/yieldbrowser/app/MainActivity.java
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No validated refactor change to commit."
          else
            git commit -m "Delegate download controls UI from MainActivity"
            git push origin HEAD:main
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "feature_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: YieldBrowser-download-controls-refactor-apk
          path: app/build/outputs/apk/debug/*.apk

      - name: Publish successful checkpoint
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          FEATURE_SHA: ${{ steps.commit.outputs.feature_sha }}
        run: |
          gh issue create \
            --title "Download controls refactor verified ${GITHUB_RUN_ID}" \
            --body "Feature commit: ${FEATURE_SHA}\nRun ID: ${GITHUB_RUN_ID}\nArtifact: YieldBrowser-download-controls-refactor-apk"

      - name: Publish failed checkpoint
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo "Run ID: ${GITHUB_RUN_ID}. MainActivity was not changed because validation failed."
            echo
            echo '```text'
            if [ -f /tmp/unit-test.log ]; then
              grep -E -B 4 -A 12 'error:|cannot find symbol|not mocked|AssertionError|There were failing tests|FAILED|Caused by:|Compilation failed' /tmp/unit-test.log | tail -n 220 || true
            else
              echo "Unit-test log was not created."
            fi
            echo '```'
          } > /tmp/failure-body.md
          gh issue create \
            --title "Download controls focused diagnostic ${GITHUB_RUN_ID}" \
            --body-file /tmp/failure-body.md
