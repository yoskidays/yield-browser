name: Build Yield Browser APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
      - refactor/bookmark-store

permissions:
  contents: write

jobs:
  build:
    name: Test and Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Apply Stage 80 guarded refactor
        if: github.ref == 'refs/heads/refactor/bookmark-store'
        run: python3 scripts/apply_bookmark_store_refactor.py

      - name: Verify patch formatting
        if: github.ref == 'refs/heads/refactor/bookmark-store'
        run: git diff --check

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Run unit tests
        run: gradle testDebugUnitTest --stacktrace

      - name: Build Debug APK
        run: gradle assembleDebug --stacktrace

      - name: Commit generated Stage 80 refactor
        if: github.ref == 'refs/heads/refactor/bookmark-store'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/src/main/java/com/yieldbrowser/app/MainActivity.java
          if ! git diff --cached --quiet; then
            git commit -m "Apply Stage 80 MainActivity refactor"
            git push origin HEAD:refactor/bookmark-store
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: YieldBrowser-debug-apk
          path: app/build/outputs/apk/debug/*.apk
