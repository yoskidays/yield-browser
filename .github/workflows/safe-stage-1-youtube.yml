name: Safe Stage 1 YouTube Guard

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    name: Test and build YouTube guard
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Restore persistent APK signing key
        id: signing-cache
        uses: actions/cache@v4
        with:
          path: ~/.android/debug.keystore
          key: yield-browser-update-signing-v1

      - name: Stop if signing key is unavailable
        if: steps.signing-cache.outputs.cache-hit != 'true'
        run: |
          echo "Yield Browser update signing key is missing."
          echo "Build stopped to prevent an incompatible APK."
          exit 1

      - name: Remove committed and cached build outputs
        run: rm -rf app/build build

      - name: Run unit tests
        run: gradle clean testDebugUnitTest --stacktrace --no-build-cache --rerun-tasks

      - name: Build debug APK
        run: gradle assembleDebug --stacktrace --no-build-cache --rerun-tasks

      - name: Verify APK signing certificate
        shell: bash
        run: |
          APK="app/build/outputs/apk/debug/app-debug.apk"
          KEY_SHA256=$(keytool -list -v \
            -keystore "$HOME/.android/debug.keystore" \
            -storepass android \
            -alias androiddebugkey \
            | sed -n 's/.*SHA256: //p' | head -n 1 | tr -d '\r')
          APK_SHA256=$(keytool -printcert -jarfile "$APK" \
            | sed -n 's/.*SHA256: //p' | head -n 1 | tr -d '\r')
          test -n "$KEY_SHA256"
          test "$KEY_SHA256" = "$APK_SHA256"

      - name: Upload stage 1 APK
        uses: actions/upload-artifact@v4
        with:
          name: YieldBrowser-stage1-youtube-debug-apk
          path: app/build/outputs/apk/debug/*.apk
