name: Safe Stage 79 HTTPS Bookmark Upgrade
on:
  push:
    branches: [refactor/https-bookmark-upgrade-policy]
  pull_request:
    branches: [main]
permissions:
  contents: write
jobs:
  validate:
    name: Test and build HTTPS bookmark upgrade extraction
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"
      - name: Apply guarded refactor
        run: python3 scripts/apply_https_bookmark_upgrade_refactor.py
      - name: Run all unit tests
        run: gradle testDebugUnitTest --stacktrace
      - name: Build debug APK
        run: gradle assembleDebug --stacktrace
      - name: Commit validated delegation
        if: github.event_name == 'push'
        env:
          HEAD_BRANCH: refactor/https-bookmark-upgrade-policy
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/src/main/java/com/yieldbrowser/app/MainActivity.java
          if git diff --cached --quiet; then
            echo "Delegation already committed."
          else
            git commit -m "Stage 79: delegate HTTPS bookmark upgrade"
            git push origin HEAD:${HEAD_BRANCH}
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: YieldBrowser-https-bookmark-upgrade-apk
          path: app/build/outputs/apk/debug/*.apk
