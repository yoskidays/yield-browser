plugins { id 'com.android.application' }

android {
    namespace 'com.yieldbrowser.app'
    compileSdk 35

    defaultConfig {
        applicationId 'com.yieldbrowser.install'
        minSdk 23
        targetSdk 30
        versionCode 47
        versionName "0.9.72"
    }

    buildTypes {
        debug {
            debuggable true
        }
        release {
            minifyEnabled false
            shrinkResources false
        }
    }

    lint {
        abortOnError false
        checkReleaseBuilds false
    }
}


dependencies {
    implementation "com.google.zxing:core:3.5.3"
}
